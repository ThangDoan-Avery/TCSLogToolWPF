<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Device Command Log View</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

    :root {
      --bg: #070a10;
      --surface: #0c0f18;
      --surface2: #111520;
      --border: #182030;
      --border2: #202840;
      --text: #b0bdd4;
      --muted: #354060;
      --muted2: #506080;
      --ready: #1fdb8a;
      --busy: #f5a623;
      --fault: #f04444;
      --idle: #243050;
      --accent: #6c47ff;

      --c-Init: #7c5cfc;
      --c-Home: #3b9eff;
      --c-GetExtend: #1fdb8a;
      --c-GetRetract: #f5a623;
      --c-Open: #38d9f5;
      --c-Close: #f0724a;
      --c-MoveToPos: #e879f9;
      --c-Batch: #a3e635;
      --c-TurnOff: #fb923c;
      --c-SetPressure: #facc15;
      --c-SetPosition: #60a5fa;
      --c-Cycle: #34d399;
      --c-Stop: #9f2626;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      min-height: 100vh;
      padding: 16px 20px;
      user-select: none;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
    }

    .sub {
      font-size: 10px;
      color: var(--muted2);
      margin-top: 3px;
    }

    .pill {
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      color: var(--muted2);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .pill.on {
      border-color: var(--accent);
      color: #c0aaff;
      background: rgba(108, 71, 255, .12);
    }

    /* ── Device tabs ── */
    .dtabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .dtab {
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border2);
      font-size: 11px;
      color: var(--muted2);
      font-family: inherit;
      background: transparent;
      transition: all .15s;
    }

    .dtab:hover {
      color: var(--text);
    }

    .dtab.active {
      border-color: var(--accent);
      color: #c0aaff;
      background: rgba(108, 71, 255, .12);
    }

    .state-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width:900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .ph {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted2);
    }

    .ph strong {
      color: var(--text);
    }

    .ph-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 9px;
      color: var(--muted);
    }

    /* ── Timeline wrap ── */
    .tl-wrap {
      padding: 10px 14px 8px;
      position: relative;
      cursor: crosshair;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .time-axis {
      display: grid;
      grid-template-columns: 120px 1fr;
    }

    .tick {
      flex: 1;
      font-size: 9px;
      color: var(--muted);
      text-align: center;
    }

    .tick:first-child {
      text-align: left;
    }

    .tick:last-child {
      text-align: right;
    }

    /* Device group */
    .device-group {
      margin-bottom: 8px;
    }

    .device-group.active {
      outline: 1px solid var(--accent);
      background: rgba(108, 71, 255, .08);
      box-shadow: inset 0 0 0 1px rgba(108, 71, 255, 0.2);
      border-radius: 4px;
      margin: 3px;
    }

    .device-group.active .dev-label {
      color: #c0aaff;
    }

    .batch-lbl {
      margin-left: 120px;
      margin-bottom: 4px;
      margin-top: 8px;
      font-size: 9px;
      color: var(--accent);
      padding: 1px 8px;
      background: rgba(108, 71, 255, .08);
      border-left: 2px solid var(--accent);
      border-radius: 0 3px 3px 0;
      display: grid;
    }


    .batch-lbl::before {
      content: '';
    }

    .dev-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      align-items: center;
    }

    .dev-label {
      width: 120px;
      min-width: 120px;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      width: auto;
      min-width: unset;
    }

    .dev-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    .dev-meta {
      font-size: 9px;
      color: var(--muted);
    }

    .row-sublabel {
      width: 120px;
      min-width: 120px;
      padding-right: 8px;
      font-size: 9px;
      color: var(--muted);
      text-align: right;
      display: flex;
      align-items: center;
      justify-content: flex-end;

      width: auto;
      min-width: unset;
    }

    .dev-label,
    .row-sublabel {
      backdrop-filter: blur(4px);
    }

    .track {
      position: relative;
      width: 100%;
      min-width: unset;
      overflow: hidden;
    }

    .state-track {
      height: 22px;
      background: rgba(255, 255, 255, .015);
    }

    .cmd-track {
      background: rgba(255, 255, 255, .01);
      border-radius: 2px;
    }

    .seg {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: default;
      transition: filter .15s;
    }

    .seg:hover {
      filter: brightness(1.15);
      z-index: 2;
    }

    .seg span {
      font-size: 9px;
      padding: 0 4px;
      font-weight: 600;
      color: rgba(0, 0, 0, .6);
      white-space: nowrap;
    }

    .cmd-seg {
      position: absolute;
      border-radius: 2px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: pointer;
      transition: filter .15s;
      border: 1px solid rgba(255, 255, 255, .15);
    }

    .cmd-seg:hover {
      filter: brightness(1.2);
      z-index: 3;
    }

    .cmd-seg.highlighted {
      outline: 2px solid rgba(255, 255, 255, .6);
      z-index: 4;
    }

    .cmd-seg span {
      font-size: 9px;
      padding: 0 5px;
      white-space: nowrap;
      font-weight: 600;
      color: rgba(0, 0, 0, .75);
    }

    /* cursor */
    .cursor-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, .28);
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    .cursor-lbl {
      position: absolute;
      top: 20px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, .15);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      color: #fff;
      white-space: nowrap;
      left: 0;
    }

    /* ── Attribute charts ── */
    .charts-section {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .attr-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .attr-toggle {
      padding: 3px 9px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid var(--border2);
      font-size: 10px;
      color: var(--muted2);
      font-family: inherit;
      background: transparent;
      transition: all .15s;
    }

    .attr-toggle.on {
      background: rgba(108, 71, 255, .1);
    }

    .attr-toggle:hover {
      color: var(--text);
    }

    .chart-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .chart-ylabel {
      width: 120px;
      min-width: 120px;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      padding-top: 2px;
    }

    .yn {
      font-size: 10px;
      color: var(--muted2);
    }

    .yv {
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
      line-height: 1;
    }

    .yu {
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
    }

    .chart-area {
      flex: 1;
      position: relative;
      height: 55px;
      border-bottom: 1px solid var(--border);
      min-width: 400px;
    }

    canvas.achart {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .ccursor {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, .28);
      pointer-events: none;
      display: none;
    }

    .cdot {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--bg);
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
    }

    /* info bar */
    .info-bar {
      display: flex;
      gap: 12px;
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted2);
      flex-wrap: wrap;
      min-height: 32px;
    }

    .ib-sep {
      color: var(--muted);
    }

    /* tooltip */
    .tooltip {
      position: fixed;
      background: #111825;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 11px;
      pointer-events: none;
      z-index: 999;
      display: none;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .7);
    }

    .tooltip.show {
      display: block;
    }

    .tt-title {
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 3px;
    }

    .tt-label {
      color: var(--muted2);
    }

    .tt-val {
      font-weight: 600;
      color: var(--text);
    }

    /* legend */
    .legend-bar {
      display: flex;
      gap: 14px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .li {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted2);
    }

    .ld {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .ldc {
      width: 16px;
      height: 8px;
      border-radius: 2px;
    }

    .tag-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tag-btn,
    .tag-add {
      padding: 4px 10px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted2);
      font-size: 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .tag-btn.active {
      border-color: var(--accent);
      color: #c0aaff;
      background: rgba(108, 71, 255, .12);
    }


    /* Import btn */
    .import-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 10px 0;
      font-family: 'JetBrains Mono', monospace;
    }

    .import-btn-label {
      background: #243050;
      color: #1fdb8a;
      border: 1px solid #1fdb8a;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .import-btn-label:hover {
      background: #1fdb8a;
      color: #121212;
    }

    .file-name-text {
      color: #94a3b8;
      font-size: 12px;
      max-width: 250px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px dashed #475569;
      padding-bottom: 2px;
    }

    .file-name-text.active {
      color: #f5a623;
      border-bottom: 1px solid #f5a623;
    }

    /* MODEL ADD NEW TAG */
    .tag-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .tag-modal.show {
      display: flex;
    }

    .tag-modal-content {
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tag-modal-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text);
    }

    #tag-name-input,
    #device-search {
      background: var(--bg);
      border: 1px solid var(--border2);
      padding: 6px;
      font-size: 11px;
      color: var(--text);
      border-radius: 4px;
    }

    .device-list {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border);
      padding: 6px;
    }

    .device-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 2px 0;
    }

    .tag-modal-footer {
      display: flex;
      justify-content: flex-end;
    }

    #tag-create-btn,
    #deselect-all-dev,
    #select-all-dev,
    #tag-close {
      background: var(--accent);
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      color: white;
      cursor: pointer;
    }

    #tag-close {
      background: var(--muted2);
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>⬡ Device Command Log</h1>
      <div class="sub">State · Commands · Attribute Time-series · Synchronized Cursor</div>
    </div>
    <div style="margin-bottom: 8px;">
      <label>
        <input type="checkbox" id="tzToggle">
        Show Time As Log Time
      </label>
    </div>
    <div class="import-wrapper">
      <label for="fileInput" class="import-btn-label">
        <span>IMPORT FILE</span>
      </label>
      <span id="fileName" class="file-name-text">No file selected</span>
      <input type="file" id="fileInput" style="display:none" accept=".json" />
    </div>
  </header>

  <div class="tag-bar" id="tag-bar">
  </div>

  <!-- Device tabs -->
  <div class="dtabs" id="device-tabs"></div>

  <div class="layout">
    <!-- LEFT: Timeline (all devices) -->
    <div>
      <div class="panel">
        <div class="ph">
          <strong>State &amp; Command Timeline</strong>
          <span class="ph-tag">All devices · State Timeline Panel</span>
        </div>
        <div class="tl-wrap" id="tl-wrap">
          <div class="time-axis" id="time-axis"></div>
          <div id="rows-container"></div>
          <div class="cursor-line" id="tl-cursor">
            <div class="cursor-lbl" id="cursor-lbl">0s</div>
          </div>
        </div>
        <div class="legend-bar" id="legend-bar"></div>
        <div class="info-bar" id="info-bar">
          <div class="ib-item"><span style="color:var(--muted)">Hover to inspect</span></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Attribute charts for selected device -->
    <div>
      <div class="panel">
        <div class="ph">
          <strong id="attr-panel-title">Attributes</strong>
          <span class="ph-tag">Time Series Panel · per attribute</span>
        </div>
        <div class="attr-toggles" id="attr-toggles"></div>
        <div class="charts-section" id="charts-section"></div>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <script>
    // ==========================================
    // 1. DATA & STATE
    // ==========================================
    let DEVICES = [];
    let selectedDevice = null;
    let activeAttrs = new Set();
    let hoverT = null;
    let highlightCmd = null;

    let activeTag = 'ALL';
    let CUSTOM_TAGS = {};
    let VIEW_START, VIEW_END, MIN_T, MAX_T;
    let ALL_TIMES = [];
    let TAG_SELECTED_DEVICES = new Set();
    let LOG_OFFSET = 0;

    const STATE_COLOR = { IDLE: '#243050', Ready: '#1fdb8a', Busy: '#f5a623', Fault: '#f04444' };
    const CMD_COLOR = {
      Init: '#7c5cfc', Home: '#3b9eff', GetExtend: '#1fdb8a', GetRetract: '#f5a623', Stop: "#9f2626",
      Open: '#38d9f5', Close: '#f0724a', MoveToPos: '#e879f9', Batch: '#a3e635', TurnOff: '#fb923c',
      SetPressure: '#facc15', SetPosition: '#60a5fa', Cycle: '#34d399', GetWaf: '#2dd4bf', PutWaf: '#10b981',
      GetWafPrePos: '#059669', PutWafPrePos: '#047857', ExchgWaf: '#f472b6', MovToLoc: '#ec4899', PutExtend: '#14b8a6',
      GetRetractPrePos: '#f97316', PutRetractPrePos: '#ea580c', PutRetract: '#c2410c', BRbtMov: '#8b5cf6', TchPos: '#d946ef',
      SetTchPos: '#a21caf', AdjustTchPos: '#701a75', SetZero: '#64748b', CalibWfrDet: '#475569', MovRel: '#6366f1',
      MotrPwr: '#4ade80', ClearWcdAveraging: '#94a3b8', BSltMov: '#818cf8', QryTchPos: '#c026d3', SetOffset: '#fb7185',
      TurnOn: '#fbbf24', SetSpeed: '#f59e0b', SetFlow: '#06b6d4', Pressure: '#0ea5e9', SetTemp: '#ef4444'
    };

    // ==========================================
    // 2. HELPERS (Math & Format)
    // ==========================================
    function pct(s) { return ((s - VIEW_START) / (VIEW_END - VIEW_START) * 100) + '%'; }
    function pctW(s, e) { return ((e - s) / (VIEW_END - VIEW_START) * 100) + '%'; }

    // Toggle Log Time
    let useLogTime = false;

    function fmtTime(ts, offsetMinutes = 0) {

      if (!ts || isNaN(ts)) return "00:00:00.000";

      const d = new Date(ts);

      let hh, mm, ss, ms;

      if (useLogTime) {

        const d2 = new Date(ts + offsetMinutes * 60000);

        hh = String(d2.getUTCHours()).padStart(2, '0');
        mm = String(d2.getUTCMinutes()).padStart(2, '0');
        ss = String(d2.getUTCSeconds()).padStart(2, '0');
        ms = String(d2.getUTCMilliseconds()).padStart(3, '0');

      } else {

        hh = String(d.getHours()).padStart(2, '0');
        mm = String(d.getMinutes()).padStart(2, '0');
        ss = String(d.getSeconds()).padStart(2, '0');
        ms = String(d.getMilliseconds()).padStart(3, '0');

      }

      return `${hh}:${mm}:${ss}.${ms}`;
    }
    function formatDuration(ms) {
      if (ms < 1000) return ms + ' ms';
      if (ms < 60000) return (ms / 1000).toFixed(2) + ' s';
      return (ms / 60000).toFixed(2) + ' min';
    }
    function formatValue(point, attr) {
      if (!point) return '';
      return attr.isDiscrete ? (point.label ?? point.v) : point.v.toFixed(5);
    }
    function getValueAt(series, t, isDiscrete) {
      if (!series || !series.length) return null;
      if (isDiscrete) {
        for (let i = series.length - 1; i >= 0; i--) { if (t >= series[i].t) return series[i]; }
        return series[0];
      }
      for (let i = 0; i < series.length - 1; i++) {
        if (t >= series[i].t && t <= series[i + 1].t) {
          const f = (t - series[i].t) / (series[i + 1].t - series[i].t);
          return { v: series[i].v + (series[i + 1].v - series[i].v) * f };
        }
      }
      return series[series.length - 1];
    }
    function getStateAt(dev, t) {
      for (const s of dev.segments) if (t >= s.s && t <= s.e) return s.st;
      return dev.segments[dev.segments.length - 1]?.st || 'N/A';
    }
    function getCmdsAt(dev, t) { return dev.commands.filter(c => t >= c.s && t <= c.e); }

    // Filter DEVICES theo Tag
    function getFilteredDevices() {
      if (activeTag === 'ALL') return DEVICES;
      return DEVICES.filter(d => d.type === activeTag);
    }

    function getFilteredDevices() {
      if (activeTag === 'ALL') return DEVICES;

      const byType = DEVICES.filter(d => d.type === activeTag);
      if (byType.length) return byType;

      const ids = CUSTOM_TAGS[activeTag] || [];
      return DEVICES.filter(d => ids.includes(d.id));
    }

    // ==========================================
    // 3. LOGIC HANDLERS
    // ==========================================
    function recomputeTime() {
      MIN_T = Infinity;
      MAX_T = -Infinity;

      DEVICES.forEach(d => {
        d.segments.forEach(s => {
          if (s.s < MIN_T) MIN_T = s.s;
          if (s.e > MAX_T) MAX_T = s.e;
        });

        d.commands.forEach(c => {
          if (c.s < MIN_T) MIN_T = c.s;
          if (c.e > MAX_T) MAX_T = c.e;
        });

        d.attrs.forEach(a => {
          a.series.forEach(p => {
            if (p.t < MIN_T) MIN_T = p.t;
            if (p.t > MAX_T) MAX_T = p.t;
          });
        });
      });

      if (MIN_T === Infinity) return;

      VIEW_START = MIN_T;
      VIEW_END = MAX_T;
    }

    // Tooltip 
    function showCmdTooltip(e, dev, cmd) {
      const tt = document.getElementById('tooltip');
      if (!tt) return;
      const color = CMD_COLOR[cmd.name] || '#888';
      tt.innerHTML = `
            <div class="tt-title" style="color:${color}">${cmd.name}</div>
            <div class="tt-row"><span class="tt-label">Device:</span><span class="tt-val">${dev.id}</span></div>
            <div class="tt-row"><span class="tt-label">Start:</span><span class="tt-val">${fmtTime(cmd.s, LOG_OFFSET)}</span></div>
            <div class="tt-row"><span class="tt-label">End:</span><span class="tt-val">${fmtTime(cmd.e, LOG_OFFSET)}</span></div>
            <div class="tt-row"><span class="tt-label">Duration:</span>
              <span class="tt-val" style="color:#fff; font-weight:bold">${formatDuration(cmd.e - cmd.s)}</span>
            </div>
            <div class="tt-note">${cmd.note || ''}</div>
        `;
      tt.classList.add('show');
      tt.style.left = Math.min(e.clientX + 15, window.innerWidth - 220) + 'px';
      tt.style.top = e.clientY + 15 + 'px';
    }

    function hideTooltip() { document.getElementById('tooltip')?.classList.remove('show'); }

    function updateInfoBar(t) {
      const ib = document.getElementById('info-bar');
      if (!ib) return;
      let html = `<span style="color:var(--muted2)">${fmtTime(t, LOG_OFFSET)}</span>`;
      const devices = getFilteredDevices();
      devices.forEach(dev => {
        const st = getStateAt(dev, t), cmds = getCmdsAt(dev, t);
        const cs = cmds.length > 0 ? cmds.map(c => `<span style="color:${CMD_COLOR[c.name] || '#888'}">${c.name}</span>`).join('+') : '—';
        html += `<span class="ib-sep">·</span>${dev.id} <span style="color:${STATE_COLOR[st]}">${st}</span> [${cs}]`;
      });
      ib.innerHTML = html;
    }

    function updateChartCursors(t) {
      if (!selectedDevice) return;
      selectedDevice.attrs.filter(a => activeAttrs.has(a.key)).forEach(attr => {
        const cc = document.getElementById('cc-' + attr.key), cd = document.getElementById('cd-' + attr.key);
        const yv = document.getElementById('yv-' + attr.key), cv = document.getElementById('cv-' + attr.key);
        if (!cv) return;
        const x = ((t - VIEW_START) / (VIEW_END - VIEW_START)) * cv.parentElement.getBoundingClientRect().width;
        const p = getValueAt(attr.series, t, attr.isDiscrete);
        if (!p) return;
        const y = 55 - ((p.v - attr.min) / (attr.max - attr.min || 1)) * 55;
        if (cc) { cc.style.display = 'block'; cc.style.left = x + 'px'; }
        if (cd) { cd.style.display = 'block'; cd.style.left = x + 'px'; cd.style.top = y + 'px'; }
        if (yv) yv.textContent = formatValue(p, attr);
      });
    }

    function hideChartCursors() { document.querySelectorAll('.ccursor, .cdot').forEach(el => el.style.display = 'none'); }

    function loadData(data) {
      DEVICES = data || [];
      LOG_OFFSET = DEVICES[0]?.offset || 0;

      if (DEVICES.length > 0) {
        activeTag = "ALL";
        selectedDevice = DEVICES[0];
        activeAttrs = new Set(selectedDevice.attrs.map(a => a.key));

        recomputeTime();
        buildTagBar();
        renderAll();
        buildLegend();
        buildTabs();
      }
    }

    // ==========================================
    // 4. UI RENDERERS
    // ==========================================
    function buildLegend() {
      const wrap = document.getElementById('legend-bar'); if (!wrap) return;
      let html = '';
      Object.entries(STATE_COLOR).forEach(([k, v]) => html += `<div class="li"><div class="ld" style="background:${v}"></div>${k}</div>`);
      html += '<span style="color:var(--muted);margin:0 4px">|</span>';
      Object.entries(CMD_COLOR).forEach(([k, v]) => html += `<div class="li"><div class="ldc" style="background:${v}cc"></div>${k}</div>`);

    // BUILD TAGBAR
    function closeTagModal() {
      document.getElementById('tag-modal').classList.remove('show');

      // reset
      document.getElementById('tag-name-input').value = '';
      document.getElementById('device-search').value = '';
    }


    function openCreateTagDialog() {
      const tagName = prompt('Enter tag name:');
      if (!tagName) return;

      if (CUSTOM_TAGS[tagName]) {
        alert('Tag already exists!');
        return;
      }

      const deviceList = DEVICES.map(d => d.id).join(', ');
      const selected = prompt(`Select devices (comma separated):\n${deviceList}`);
      if (!selected) return;

      const ids = selected.split(',').map(s => s.trim());

      CUSTOM_TAGS[tagName] = ids;
      activeTag = tagName;

      // localStorage
      localStorage.setItem('customTags', JSON.stringify(CUSTOM_TAGS));

      buildTagBar();
      renderAll();
      buildTabs();
    }

    // edit Tag
    function editTag(tag) {
      const ids = CUSTOM_TAGS[tag];

      document.getElementById('tag-modal').classList.add('show');
      document.getElementById('tag-name-input').value = tag;

      renderDeviceList('');

      // tick sẵn device
      TAG_SELECTED_DEVICES = new Set(ids);
      renderDeviceList('');

      // override create button → update
      document.getElementById('tag-create-btn').onclick = () => {
        const newName = document.getElementById('tag-name-input').value.trim();

        const selected = [...TAG_SELECTED_DEVICES];

        delete CUSTOM_TAGS[tag];
        CUSTOM_TAGS[newName] = selected;

        localStorage.setItem('customTags', JSON.stringify(CUSTOM_TAGS));

        activeTag = newName;

        closeTagModal();
        buildTagBar();
        renderAll();
        buildTabs();

        // restore default handler
        initTagModalEvents();
      };
    }

    function deleteTag(tag) {
      if (!confirm(`Delete tag "${tag}"?`)) return;

      delete CUSTOM_TAGS[tag];

      localStorage.setItem('customTags', JSON.stringify(CUSTOM_TAGS));

      activeTag = 'ALL';

      buildTagBar();
      renderAll();
      buildTabs();
    }


    function renderDeviceList(keyword) {
      const wrap = document.getElementById('device-list');
      if (!wrap) return;

      wrap.innerHTML = '';

      DEVICES
        .filter(d => d.id.toLowerCase().includes(keyword.toLowerCase()))
        .forEach(d => {
          const row = document.createElement('label');
          row.className = 'device-item';

          const checked = TAG_SELECTED_DEVICES.has(d.id) ? 'checked' : '';

          row.innerHTML = `
          <input type="checkbox" value="${d.id}" ${checked} />
          <span>${d.id} (${d.type})</span>
        `;

          const checkbox = row.querySelector('input');

          checkbox.onchange = () => {
            if (checkbox.checked) {
              TAG_SELECTED_DEVICES.add(d.id);
            } else {
              TAG_SELECTED_DEVICES.delete(d.id);
            }
          };
          wrap.appendChild(row);
        });
    }

    function openCreateTagDialog() {
      TAG_SELECTED_DEVICES = new Set();
      document.getElementById('tag-modal').classList.add('show');
      renderDeviceList('');
    }

    function buildTagBar() {
      const tagBar = document.getElementById('tag-bar');
      if (!tagBar) return;

      tagBar.innerHTML = '';

      // ALL
      const allBtn = document.createElement('button');
      allBtn.className = 'tag-btn' + (activeTag === 'ALL' ? ' active' : '');
      allBtn.textContent = 'All';
      allBtn.dataset.tag = 'ALL';
      allBtn.onclick = () => setActiveTag('ALL');
      tagBar.appendChild(allBtn);

      // TYPE TAG
      const types = [...new Set(DEVICES.map(d => d.type))];
      types.forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn' + (activeTag === type ? ' active' : '');
        btn.textContent = type;
        btn.dataset.tag = type;
        btn.onclick = () => setActiveTag(type);
        tagBar.appendChild(btn);
      });

      // CUSTOM TAG
      Object.keys(CUSTOM_TAGS).forEach(tag => {
        const btn = document.createElement('button');

        btn.className = 'tag-btn' + (activeTag === tag ? ' active' : '');
        btn.dataset.tag = tag;

        btn.style.display = 'flex';
        btn.style.alignItems = 'center';
        btn.style.gap = '6px';

        // TEXT
        const text = document.createElement('span');
        text.textContent = tag;

        // EDIT ICON
        const edit = document.createElement('span');
        edit.textContent = '+';
        edit.style.fontSize = '11px';
        edit.style.cursor = 'pointer';
        edit.style.opacity = '0.7';
        edit.style.color = '#1fdb8a';

        edit.onclick = (e) => {
          e.stopPropagation();
          editTag(tag);
        };
        btn.ondblclick = () => editTag(tag);

        // DELETE ICON
        const del = document.createElement('span');
        del.textContent = 'x';
        del.style.color = '#f04444';
        del.style.cursor = 'pointer';
        del.style.fontWeight = 'bold';

        del.onclick = (e) => {
          e.stopPropagation();
          deleteTag(tag);
        };

        btn.appendChild(text);
        btn.appendChild(edit);
        btn.appendChild(del);

        // CLICK TAG
        btn.onclick = () => setActiveTag(tag);

        tagBar.appendChild(btn);
      });

      // ADD BUTTON
      const addBtn = document.createElement('button');
      addBtn.className = 'tag-add';
      addBtn.textContent = '+ Create New Tag';
      addBtn.onclick = openCreateTagDialog;
      tagBar.appendChild(addBtn);

    // Set active cho tag
    function setActiveTag(tag) {
      activeTag = tag;

      const filtered = getFilteredDevices();

      if (!filtered.length) {
        activeTag = 'ALL';
      }

      if (!filtered.includes(selectedDevice)) {
        selectedDevice = filtered[0] || null;
      }

      // update UI active
      buildTagBar();
      renderAll();
      buildTabs();
    }


    // KHÔI PHỤC VẼ LINE & STEP & HIGHLIGHT TRÊN CHART
    function drawChart(canvas, attr, dev) {
      if (!canvas) return;
      const isStep = !!attr.isDiscrete;
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const W = rect.width, H = rect.height || 55;

      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);

      // 1. State bands 
      dev.segments.forEach(seg => {
        ctx.fillStyle = STATE_COLOR[seg.st] + '18';
        ctx.fillRect(((seg.s - VIEW_START) / (VIEW_END - VIEW_START)) * W, 0, ((seg.e - seg.s) / (VIEW_END - VIEW_START)) * W, H);
      });

      // 2. Highlight command band (Nếu có click chọn)
      if (highlightCmd) {
        dev.commands.filter(c => c.name === highlightCmd).forEach(cmd => {
          const color = CMD_COLOR[cmd.name] || '#888';
          ctx.fillStyle = color + '28';
          ctx.fillRect(((cmd.s - VIEW_START) / (VIEW_END - VIEW_START)) * W, 0, ((cmd.e - cmd.s) / (VIEW_END - VIEW_START)) * W, H);
        });
      }

      // 3. Grid ngang & Labels Max/Min
      ctx.strokeStyle = '#182030'; ctx.lineWidth = 1;
      for (let i = 1; i < 4; i++) {
        const y = (i / 4) * H; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
      ctx.fillStyle = '#354060'; ctx.font = '8px "JetBrains Mono", monospace';
      ctx.fillText(attr.max, 2, 9);
      ctx.fillText(attr.min, 2, H - 2);

      // 4. Vẽ Chart chính (Line hoặc Step)
      if (!attr.series || attr.series.length === 0) return;
      const range = attr.max - attr.min || 1;
      ctx.beginPath();
      ctx.strokeStyle = attr.color;
      ctx.lineWidth = 1.5;

      if (isStep) {
        for (let i = 0; i < attr.series.length - 1; i++) {
          const p0 = attr.series[i], p1 = attr.series[i + 1];
          const x0 = ((p0.t - VIEW_START) / (VIEW_END - VIEW_START)) * W;
          const y0 = H - ((p0.v - attr.min) / range) * H;
          const x1 = ((p1.t - VIEW_START) / (VIEW_END - VIEW_START)) * W;
          const y1 = H - ((p1.v - attr.min) / range) * H;
          if (i === 0) ctx.moveTo(x0, y0);
          ctx.lineTo(x1, y0); ctx.lineTo(x1, y1);
        }
      } else {
        attr.series.forEach((p, i) => {
          const x = ((p.t - VIEW_START) / (VIEW_END - VIEW_START)) * W;
          const y = H - ((p.v - attr.min) / range) * H;
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
      }
      ctx.stroke();

      // 5. Fill Area (Đổ màu gradient dưới đường vẽ)
      // Tái sử dụng path để fill cho mượt
      ctx.lineTo(((attr.series[attr.series.length - 1].t - VIEW_START) / (VIEW_END - VIEW_START)) * W, H);
      ctx.lineTo(((attr.series[0].t - VIEW_START) / (VIEW_END - VIEW_START)) * W, H);
      ctx.closePath();
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, attr.color + '38');
      grad.addColorStop(1, attr.color + '00');
      ctx.fillStyle = grad;
      ctx.fill();

      // 6. COMMAND MARKERS (Đường kẻ dọc Command & Tên Command)
      dev.commands.forEach(cmd => {
        const color = CMD_COLOR[cmd.name] || '#888';
        ctx.save();
        ctx.setLineDash([2, 4]);

        // Vẽ vạch Start của command
        const xS = ((cmd.s - VIEW_START) / (VIEW_END - VIEW_START)) * W;
        if (xS >= 0 && xS <= W) {
          ctx.strokeStyle = color + '60';
          ctx.beginPath(); ctx.moveTo(xS, 0); ctx.lineTo(xS, H); ctx.stroke();

          // Hiện tên Command ở lane 0 (tránh đè nhau)
          if (cmd.lane === 0) {
            ctx.setLineDash([]);
            ctx.fillStyle = color + 'cc';
            ctx.font = '8px "JetBrains Mono", monospace';
            ctx.fillText(cmd.name, xS + 4, 9);
          }
        }
        ctx.restore();
      });
    }

    function buildTimeline() {
      const container = document.getElementById('rows-container');
      if (!container) return;
      container.innerHTML = '';
      const devices = getFilteredDevices();

      let lastBatch = null;

      devices.forEach(dev => {
        // 1. Hiển thị nhãn Batch nếu thay đổi
        if (dev.batch !== lastBatch) {
          const bl = document.createElement('div');
          bl.className = 'batch-lbl';
          bl.textContent = '⬡ ' + dev.batch.toUpperCase();
          container.appendChild(bl);
          lastBatch = dev.batch;
        }

        const grp = document.createElement('div');
        grp.className = 'device-group' + (dev === selectedDevice ? ' active' : '');

        // 2. STATE ROW
        const sr = document.createElement('div');
        sr.className = 'dev-row';

        // Label bên trái
        const sl = document.createElement('div');
        sl.className = 'dev-label';
        sl.innerHTML = `<span class="dev-name">${dev.id}</span><span class="dev-meta">${dev.type}</span>`;
        sr.appendChild(sl);

        // Track bên phải
        const stTrack = document.createElement('div');
        stTrack.className = 'track state-track';
        dev.segments.forEach(seg => {
          const el = document.createElement('div');
          el.className = 'seg';
          el.style.left = pct(seg.s);
          el.style.width = pctW(seg.s, seg.e);
          el.style.background = STATE_COLOR[seg.st];

          // Hiện chữ trạng thái nếu đủ rộng
          if (seg.e - seg.s > 5) {
            const sp = document.createElement('span');
            sp.textContent = seg.st.toUpperCase();
            el.appendChild(sp);
          }
          stTrack.appendChild(el);
        });
        sr.appendChild(stTrack);
        grp.appendChild(sr);

        // 3. COMMAND ROW (Dòng lệnh - Hỗ trợ Parallel Lane)
        const hasParallel = dev.commands.some(c => (c.lane || 0) > 0);
        const cmdH = hasParallel ? 40 : 20; // Tăng chiều cao nếu có song song

        const cr = document.createElement('div');
        cr.className = 'dev-row';

        const cl = document.createElement('div');
        cl.className = 'row-sublabel';
        cl.textContent = 'cmd';
        cr.appendChild(cl);

        // Track chứa các command
        const ctTrack = document.createElement('div');
        ctTrack.className = 'track cmd-track';
        ctTrack.style.height = cmdH + 'px';

        dev.commands.forEach(cmd => {
          const el = document.createElement('div');
          el.className = 'cmd-seg';
          el.style.left = pct(cmd.s);
          el.style.width = pctW(cmd.s, cmd.e);
          el.style.background = (CMD_COLOR[cmd.name] || '#888') + 'cc';

          // Xử lý vị trí theo Lane
          if (hasParallel) {
            const lh = (cmdH - 4) / 2; // Chiều cao mỗi lane
            el.style.top = (2 + (cmd.lane || 0) * (lh + 2)) + 'px';
            el.style.height = lh + 'px';
          } else {
            el.style.top = '0';
            el.style.height = '100%';
          }

          // HIỂN THỊ TÊN COMMAND TRÊN TIMELINE
          if (cmd.e - cmd.s >= 4) {
            const sp = document.createElement('span');
            sp.textContent = cmd.name;
            el.appendChild(sp);
          }

          // Sự kiện tương tác
          el.addEventListener('mouseenter', e => showCmdTooltip(e, dev, cmd));
          el.addEventListener('mouseleave', hideTooltip);
          el.addEventListener('click', () => {
            highlightCmd = cmd.name;
            buildAttrPanel(); // Re-render charts để hiện highlight
          });

          ctTrack.appendChild(el);
        });
        cr.appendChild(ctTrack);
        grp.appendChild(cr);

        container.appendChild(grp);
      });
    }

    function buildAxis() {
      const ax = document.getElementById('time-axis'); if (!ax) return;
      ax.innerHTML = '<div></div>';
      const ticksWrap = document.createElement('div'); ticksWrap.style.display = 'flex'; ticksWrap.style.width = '100%';
      const step = (VIEW_END - VIEW_START) / 6;
      for (let i = 0; i <= 6; i++) {
        const d = document.createElement('div'); d.className = 'tick'; d.style.flex = '1';
        d.textContent = fmtTime(VIEW_START + step * i, LOG_OFFSET); ticksWrap.appendChild(d);
      }
      ax.appendChild(ticksWrap);
    }

    // BUILD TAB DEVICES TYPE
    function buildTabs() {
      const wrap = document.getElementById('device-tabs');
      if (!wrap) return;

      wrap.innerHTML = '';

      const devices = getFilteredDevices();

      devices.forEach(dev => {
        const b = document.createElement('button');
        b.className = 'dtab' + (dev === selectedDevice ? ' active' : '');
        b.innerHTML = `
      <span class="state-dot" style="background:${STATE_COLOR[dev.lastState]}"></span>
      ${dev.id}
    `;

        b.onclick = () => {
          selectedDevice = dev;
          activeAttrs = new Set(dev.attrs.map(a => a.key));
          buildTabs();
          buildAttrPanel();
          buildTimeline();
        };

        wrap.appendChild(b);
      });
    }

    function buildAttrPanel() {
      const dev = selectedDevice;
      if (!dev) {
        document.getElementById('attr-panel-title').textContent = 'No device';
        document.getElementById('charts-section').innerHTML = '';
        return;
      }
      document.getElementById('attr-panel-title').textContent = `Attributes — ${dev.id}`;

      // 1. Toggles
      const tw = document.getElementById('attr-toggles');
      tw.innerHTML = '<span style="font-size:10px; color:var(--muted); align-self:center; font-family:\'JetBrains Mono\'">Show:</span>';

      dev.attrs.forEach(attr => {
        const on = activeAttrs.has(attr.key);
        const b = document.createElement('button');
        b.className = 'attr-toggle' + (on ? ' on' : '');
        b.textContent = attr.label;
        b.style.fontFamily = '"JetBrains Mono", monospace';
        if (on) {
          b.style.borderColor = attr.color;
          b.style.color = attr.color;
        }
        b.onclick = () => {
          activeAttrs.has(attr.key) ? activeAttrs.delete(attr.key) : activeAttrs.add(attr.key);
          buildAttrPanel();
        };
        tw.appendChild(b);
      });

      // 2. Render Charts Section
      const cs = document.getElementById('charts-section');
      cs.innerHTML = '';
      dev.attrs.filter(a => activeAttrs.has(a.key)).forEach(attr => {
        const row = document.createElement('div');
        row.className = 'chart-row';

        // Lấy giá trị hiện tại tại vị trí hover
        const p = getValueAt(attr.series, hoverT ?? MIN_T, attr.isDiscrete);
        const curVal = formatValue(p, attr);

        row.innerHTML = `
            <div class="chart-ylabel">
                <div class="yn">${attr.label}</div>
                <div class="yv" style="color:${attr.color}" id="yv-${attr.key}">${curVal}</div>
                <div class="yu">${attr.unit}</div>
            </div>
            <div class="chart-area">
                <canvas class="achart" id="cv-${attr.key}"></canvas>
                <div class="ccursor" id="cc-${attr.key}"></div>
                <div class="cdot" id="cd-${attr.key}" style="background:${attr.color}"></div>
            </div>
        `;
        cs.appendChild(row);

        // Vẽ chart sau khi DOM đã sẵn sàng
        const canvas = row.querySelector('canvas');
        requestAnimationFrame(() => drawChart(canvas, attr, dev));

        // Event hover đồng bộ
        const area = row.querySelector('.chart-area');
        area.onmousemove = (e) => {
          const rect = area.getBoundingClientRect();
          const x = e.clientX - rect.left;
          hoverT = VIEW_START + (x / rect.width) * (VIEW_END - VIEW_START);
          updateInfoBar(hoverT);
          updateChartCursors(hoverT);

          // Đồng bộ Cursor Timeline
          const labelEl = document.querySelector('.dev-label');
          const LABEL_W = labelEl ? labelEl.getBoundingClientRect().width : 120;
          const tlCursor = document.getElementById('tl-cursor');
          if (tlCursor) {
            tlCursor.style.display = 'block';
            tlCursor.style.left = (LABEL_W + x) + 'px';
            document.getElementById('cursor-lbl').textContent = fmtTime(hoverT, LOG_OFFSET);
          }
        };
      });
    }

    function renderAll() {
      buildAxis();
      buildTimeline();
      buildAttrPanel();
    }

    function initTagModalEvents() {
      document.getElementById('device-search')
        .addEventListener('input', (e) => {
          renderDeviceList(e.target.value);
        });


      const createBtn = document.getElementById('tag-create-btn');
      createBtn.onclick = null;
      createBtn.onclick = () => {
        const name = document.getElementById('tag-name-input').value.trim();
        if (!name) return alert('Enter tag name');

        if (CUSTOM_TAGS[name]) {
          return alert('Tag already exists');
        }

        const ids = [...TAG_SELECTED_DEVICES]

        if (ids.length === 0) {
          return alert('Select at least one device');
        }

        CUSTOM_TAGS[name] = ids;

        localStorage.setItem('customTags', JSON.stringify(CUSTOM_TAGS));

        activeTag = name;

        closeTagModal();
        buildTagBar();
        renderAll();
        buildTabs();
      };

      // CLOSE TAG
      document.getElementById('tag-close').onclick = closeTagModal;

      // SELECT ALL
      document.getElementById('select-all-dev').onclick = () => {
        DEVICES.forEach(d => TAG_SELECTED_DEVICES.add(d.id));
        renderDeviceList(document.getElementById('device-search').value);
      };

      // DESELECT ALL
      document.getElementById('deselect-all-dev').onclick = () => {
        TAG_SELECTED_DEVICES.clear();
        renderDeviceList(document.getElementById('device-search').value);
      };
    }

    // ==========================================
    // 5. INITIALIZATION & INTERACTION
    // ==========================================
    window.addEventListener('load', function () {
      CUSTOM_TAGS = JSON.parse(localStorage.getItem('customTags') || '{}');
      recomputeTime();
      if (DEVICES.length > 0) {
        selectedDevice = DEVICES[0];
        activeAttrs = new Set(selectedDevice.attrs.map(a => a.key));
        buildTagBar();
        renderAll();
        buildLegend();
        buildTabs();
      }

      const tlWrap = document.getElementById('tl-wrap');
      let isDragging = false, lastX = 0;

      tlWrap?.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = tlWrap.getBoundingClientRect();
        const LABEL_W = document.querySelector('.dev-label')?.getBoundingClientRect().width || 120;
        const trackW = rect.width - LABEL_W - 14;
        const mouseX = Math.max(0, Math.min(trackW, e.clientX - rect.left - LABEL_W));
        const mouseRatio = mouseX / trackW;
        const range = VIEW_END - VIEW_START;
        const zoomAmount = range * 0.1 * (e.deltaY < 0 ? 1 : -1);
        VIEW_START += zoomAmount * mouseRatio; VIEW_END -= zoomAmount * (1 - mouseRatio);
        VIEW_START = Math.max(MIN_T, VIEW_START); VIEW_END = Math.min(MAX_T, VIEW_END);
        renderAll();
      });

      tlWrap?.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; });
      window.addEventListener('mouseup', () => isDragging = false);
      tlWrap?.addEventListener('mousemove', e => {
        const rect = tlWrap.getBoundingClientRect();
        const LABEL_W = document.querySelector('.dev-label')?.getBoundingClientRect().width || 120;
        const trackW = rect.width - LABEL_W - 14;
        if (isDragging) {
          const dx = e.clientX - lastX; lastX = e.clientX;
          const dt = (dx / trackW) * (VIEW_END - VIEW_START);
          VIEW_START -= dt; VIEW_END -= dt; renderAll();
        }
        const x = Math.max(0, Math.min(trackW, e.clientX - rect.left - LABEL_W));
        hoverT = VIEW_START + (x / trackW) * (VIEW_END - VIEW_START);
        const cursor = document.getElementById('tl-cursor');
        if (cursor) { 
          cursor.style.display = 'block'; 
          cursor.style.left = (LABEL_W + x) + 'px'; 
          document.getElementById('cursor-lbl').textContent = fmtTime(hoverT, LOG_OFFSET); }
          updateInfoBar(hoverT);
          updateChartCursors(hoverT);
      });

      tlWrap?.addEventListener('mouseleave', () => {
        document.getElementById('tl-cursor').style.display = 'none';
        hideChartCursors();
      });

      tlWrap?.addEventListener('dblclick', () => { VIEW_START = MIN_T; VIEW_END = MAX_T; renderAll(); });

      document.getElementById('fileInput')?.addEventListener('change', function (e) {
        const file = e.target.files[0]; if (!file) return;
        const nameDisplay = document.getElementById('fileName');
        if (file) {
          nameDisplay.textContent = file.name;
          nameDisplay.classList.add('active');

        }

        const reader = new FileReader();
        reader.onload = function (evt) {
          const data = JSON.parse(evt.target.result);
          loadData(data);
          if (DEVICES.length > 0) {
            activeTag = "ALL";
            selectedDevice = DEVICES[0];
            activeAttrs = new Set(selectedDevice.attrs.map(a => a.key));
            buildTagBar();
            recomputeTime();
            renderAll();
            buildLegend();
            buildTabs();
          }
        };
        reader.readAsText(file);
      });

      document.getElementById('device-search').addEventListener('input', (e) => {
        renderDeviceList(e.target.value);
      });

      document.getElementById("tzToggle").addEventListener("change", function (e) {
        useLogTime = e.target.checked;

        buildTagBar();
        recomputeTime();
        renderAll();
        buildLegend();
        buildTabs();
      });

      initTagModalEvents();
    });

    // Cho WPF gọi
    window.setDevicesFromWpf = function (data) {
      console.log("Received data from WPF", data);
      loadData(data);
    };
  </script>
</body>

    </div>

    <input id="tag-name-input" placeholder="Tag name..." />

    <input id="device-search" placeholder="Search device..." />

    <div style="display:flex; gap:6px;">
      <button id="select-all-dev">Select All</button>
      <button id="deselect-all-dev">Clear</button>

    <div id="device-list" class="device-list"></div>

    </div>
  </div>
</div>

</html>
