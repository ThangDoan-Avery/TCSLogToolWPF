<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Device Log — Full Stack View</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap');

    :root {
      --bg: #070a10;
      --surface: #0c0f18;
      --surface2: #111520;
      --border: #182030;
      --border2: #202840;
      --text: #b0bdd4;
      --muted: #354060;
      --muted2: #506080;
      --ready: #1fdb8a;
      --busy: #f5a623;
      --fault: #f04444;
      --idle: #243050;
      --accent: #6c47ff;

      --c-Init: #7c5cfc;
      --c-Home: #3b9eff;
      --c-GetExtend: #1fdb8a;
      --c-GetRetract: #f5a623;
      --c-Open: #38d9f5;
      --c-Close: #f0724a;
      --c-MoveToPos: #e879f9;
      --c-Batch: #a3e635;
      --c-TurnOff: #fb923c;
      --c-SetPressure: #facc15;
      --c-SetPosition: #60a5fa;
      --c-Cycle: #34d399;
      --c-Stop: #9f2626;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      min-height: 100vh;
      padding: 16px 20px;
      user-select: none;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
    }

    .sub {
      font-size: 10px;
      color: var(--muted2);
      margin-top: 3px;
    }

    .pill {
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      color: var(--muted2);
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .pill.on {
      border-color: var(--accent);
      color: #c0aaff;
      background: rgba(108, 71, 255, .12);
    }

    /* ── Device tabs ── */
    .dtabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .dtab {
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border2);
      font-size: 11px;
      color: var(--muted2);
      font-family: inherit;
      background: transparent;
      transition: all .15s;
    }

    .dtab:hover {
      color: var(--text);
    }

    .dtab.active {
      border-color: var(--accent);
      color: #c0aaff;
      background: rgba(108, 71, 255, .12);
    }

    .state-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width:900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .ph {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted2);
    }

    .ph strong {
      color: var(--text);
    }

    .ph-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 9px;
      color: var(--muted);
    }

    /* ── Timeline wrap ── */
    .tl-wrap {
      padding: 10px 14px 8px;
      position: relative;
      cursor: crosshair;
      overflow-x: auto;
    }

    .time-axis {
      display: flex;
      margin-left: 120px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 3px;
    }

    .tick {
      flex: 1;
      font-size: 9px;
      color: var(--muted);
    }

    /* Device group */
    .device-group {
      margin-bottom: 8px;
    }

    .batch-lbl {
      margin-left: 120px;
      margin-bottom: 4px;
      margin-top: 8px;
      font-size: 9px;
      color: var(--accent);
      padding: 1px 8px;
      background: rgba(108, 71, 255, .08);
      border-left: 2px solid var(--accent);
      border-radius: 0 3px 3px 0;
      display: inline-block;
    }

    .dev-row {
      display: flex;
      align-items: center;
      margin-bottom: 3px;
    }

    .dev-label {
      width: 120px;
      min-width: 120px;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
    }

    .dev-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
    }

    .dev-meta {
      font-size: 9px;
      color: var(--muted);
    }

    .row-sublabel {
      width: 120px;
      min-width: 120px;
      padding-right: 8px;
      font-size: 9px;
      color: var(--muted);
      text-align: right;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .track {
      flex: 1;
      position: relative;
      border-radius: 3px;
      min-width: 400px;
    }

    .state-track {
      height: 22px;
      background: rgba(255, 255, 255, .015);
    }

    .cmd-track {
      background: rgba(255, 255, 255, .01);
      border-radius: 2px;
    }

    .seg {
      position: absolute;
      height: 100%;
      border-radius: 2px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: default;
      transition: filter .15s;
    }

    .seg:hover {
      filter: brightness(1.15);
      z-index: 2;
    }

    .seg span {
      font-size: 9px;
      padding: 0 4px;
      font-weight: 600;
      color: rgba(0, 0, 0, .6);
      white-space: nowrap;
    }

    .cmd-seg {
      position: absolute;
      border-radius: 2px;
      display: flex;
      align-items: center;
      overflow: hidden;
      cursor: pointer;
      transition: filter .15s;
      border: 1px solid rgba(255, 255, 255, .15);
    }

    .cmd-seg:hover {
      filter: brightness(1.2);
      z-index: 3;
    }

    .cmd-seg.highlighted {
      outline: 2px solid rgba(255, 255, 255, .6);
      z-index: 4;
    }

    .cmd-seg span {
      font-size: 9px;
      padding: 0 5px;
      white-space: nowrap;
      font-weight: 600;
      color: rgba(0, 0, 0, .75);
    }

    /* cursor */
    .cursor-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, .28);
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    .cursor-lbl {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, .15);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      color: #fff;
      white-space: nowrap;
    }

    /* ── Attribute charts ── */
    .charts-section {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .attr-toggles {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .attr-toggle {
      padding: 3px 9px;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid var(--border2);
      font-size: 10px;
      color: var(--muted2);
      font-family: inherit;
      background: transparent;
      transition: all .15s;
    }

    .attr-toggle.on {
      background: rgba(108, 71, 255, .1);
    }

    .attr-toggle:hover {
      color: var(--text);
    }

    .chart-row {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .chart-ylabel {
      width: 120px;
      min-width: 120px;
      padding-right: 8px;
      display: flex;
      flex-direction: column;
      padding-top: 2px;
    }

    .yn {
      font-size: 10px;
      color: var(--muted2);
    }

    .yv {
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
      line-height: 1;
    }

    .yu {
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
    }

    .chart-area {
      flex: 1;
      position: relative;
      height: 55px;
      border-bottom: 1px solid var(--border);
      min-width: 400px;
    }

    canvas.achart {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .ccursor {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(255, 255, 255, .28);
      pointer-events: none;
      display: none;
    }

    .cdot {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--bg);
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;
    }

    /* info bar */
    .info-bar {
      display: flex;
      gap: 12px;
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted2);
      flex-wrap: wrap;
      min-height: 32px;
    }

    .ib-sep {
      color: var(--muted);
    }

    /* tooltip */
    .tooltip {
      position: fixed;
      background: #111825;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 11px;
      pointer-events: none;
      z-index: 999;
      display: none;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .7);
    }

    .tooltip.show {
      display: block;
    }

    .tt-title {
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 3px;
    }

    .tt-label {
      color: var(--muted2);
    }

    .tt-val {
      font-weight: 600;
      color: var(--text);
    }

    /* legend */
    .legend-bar {
      display: flex;
      gap: 14px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .li {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted2);
    }

    .ld {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .ldc {
      width: 16px;
      height: 8px;
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <header>
    <div>
      <h1>⬡ Device Command Log — Full Stack</h1>
      <div class="sub">State · Commands · Attribute Time-series · Synchronized Cursor</div>
    </div>
  </header>

  <!-- Device tabs -->
  <div class="dtabs" id="device-tabs"></div>

  <div class="layout">
    <!-- LEFT: Timeline (all devices) -->
    <div>
      <div class="panel">
        <div class="ph">
          <strong>State &amp; Command Timeline</strong>
          <span class="ph-tag">All devices · State Timeline Panel</span>
        </div>
        <div class="tl-wrap" id="tl-wrap">
          <div class="time-axis" id="time-axis"></div>
          <div id="rows-container"></div>
          <div class="cursor-line" id="tl-cursor">
            <div class="cursor-lbl" id="cursor-lbl">0s</div>
          </div>
        </div>
        <div class="legend-bar" id="legend-bar"></div>
        <div class="info-bar" id="info-bar">
          <div class="ib-item"><span style="color:var(--muted)">Hover to inspect</span></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: Attribute charts for selected device -->
    <div>
      <div class="panel">
        <div class="ph">
          <strong id="attr-panel-title">Attributes</strong>
          <span class="ph-tag">Time Series Panel · per attribute</span>
        </div>
        <div class="attr-toggles" id="attr-toggles"></div>
        <div class="charts-section" id="charts-section"></div>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>

    //const TOTAL_S = 90 

    const STATE_COLOR = { idle: '#243050', ready: '#1fdb8a', busy: '#f5a623', fault: '#f04444' };
    const CMD_COLOR = {
      Init: '#7c5cfc', Home: '#3b9eff', GetExtend: '#1fdb8a', GetRetract: '#f5a623', Stop: "#9f2626", 
      Open: '#38d9f5', Close: '#f0724a', MoveToPos: '#e879f9', Batch: '#a3e635', TurnOff: '#fb923c', 
      SetPressure: '#facc15', SetPosition: '#60a5fa', Cycle: '#34d399', GetWaf: '#2dd4bf', PutWaf: '#10b981',
      GetWafPrePos: '#059669', PutWafPrePos: '#047857', ExchgWaf: '#f472b6', MovToLoc: '#ec4899', PutExtend: '#14b8a6',
      GetRetractPrePos: '#f97316', PutRetractPrePos: '#ea580c', PutRetract: '#c2410c', BRbtMov: '#8b5cf6', TchPos: '#d946ef',
      SetTchPos: '#a21caf', AdjustTchPos: '#701a75', SetZero: '#64748b', CalibWfrDet: '#475569', MovRel: '#6366f1',
      MotrPwr: '#4ade80', ClearWcdAveraging: '#94a3b8', BSltMov: '#818cf8', QryTchPos: '#c026d3', SetOffset: '#fb7185',
      TurnOn: '#fbbf24', SetSpeed: '#f59e0b', SetFlow: '#06b6d4', Pressure: '#0ea5e9', SetTemp: '#ef4444'
    };

    // ── helpers ──────────────────────────────────────────────────────────────────
    //function pct(s) { return (s / TOTAL_S * 100).toFixed(4) + '%'; }
    //function pctW(s, e) { return ((e - s) / TOTAL_S * 100).toFixed(4) + '%'; }
    function pct(s) { return ((s - MIN_T) / TOTAL_S * 100) + '%'; }
    function pctW(s, e) { return ((e - s) / TOTAL_S * 100) + '%'; }

    function genSeries(pts) {
      const out = [];
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i], p1 = pts[i + 1];
        const steps = Math.round((p1.t - p0.t) / 0.4);
        for (let s = 0; s <= steps; s++) {
          const f = s / steps, sf = f * f * (3 - 2 * f);
          out.push({ t: p0.t + (p1.t - p0.t) * f, v: p0.v + (p1.v - p0.v) * sf });
        }
      }
      out.push(pts[pts.length - 1]);
      return out;
    }
    function noise(series, amp) {
      return series.map(p => ({ t: p.t, v: p.v + (Math.random() - .5) * amp }));
    }
    function lerp(series, t) {
      if (!series || !series.length) return 0;
      //t = Math.max(0, Math.min(TOTAL_S, t));
      t = Math.max(MIN_T, Math.min(MAX_T, t));
      for (let i = 0; i < series.length - 1; i++) {
        if (t >= series[i].t && t <= series[i + 1].t) {
          const f = (t - series[i].t) / (series[i + 1].t - series[i].t);
          return series[i].v + (series[i + 1].v - series[i].v) * f;
        }
      }
      return series[series.length - 1].v;
    }

    // ── Data ─────────────────────────────────────────────────────────────────────
    const BASE = new Date("2026-02-03T00:56:30.000Z").getTime();

    const DEVICES = [
    {
      id: 'EFEM-01',
      type: 'EFEM Robot',
      batch: 'batch-001',
      lastState: 'ready',
      segments: [
        { s: BASE + 0, e: BASE + 5000, st: 'idle' },
        { s: BASE + 5000, e: BASE + 7000, st: 'ready' },
        { s: BASE + 7000, e: BASE + 55000, st: 'busy' },
        { s: BASE + 55000, e: BASE + 90000, st: 'ready' }
      ],
      commands: [
        { name: 'Init', s: BASE + 5000, e: BASE + 10000, lane: 0, note: '' },
        { name: 'Home', s: BASE + 10000, e: BASE + 18000, lane: 0, note: '' },
        { name: 'GetExtend', s: BASE + 18000, e: BASE + 35000, lane: 0, note: '' },
        { name: 'GetRetract', s: BASE + 35000, e: BASE + 45000, lane: 0, note: '' },
        { name: 'Cycle', s: BASE + 45000, e: BASE + 55000, lane: 0, note: '' }
      ],
      attrs: [
        {
          key: 'arm_speed',
          label: 'Arm Speed',
          unit: 'mm/s',
          color: '#3b9eff',
          series: [
            { t: BASE + 0, v: 0 },
            { t: BASE + 10000, v: 800 },
            { t: BASE + 20000, v: 600 },
            { t: BASE + 40000, v: 700 },
            { t: BASE + 55000, v: 0 }
          ],
          min: 0,
          max: 900,
          fmt: v => Math.round(v)
        }
      ]
    }
    ];
    
    const ALL_TIMES = [];

    DEVICES.forEach(d => {
      d.segments.forEach(s => { ALL_TIMES.push(s.s, s.e); });
      d.commands.forEach(c => { ALL_TIMES.push(c.s, c.e); });
      d.attrs.forEach(a => a.series.forEach(p => ALL_TIMES.push(p.t)));
    });

    const MIN_T = Math.min(...ALL_TIMES);
    const MAX_T = Math.max(...ALL_TIMES);
    const TOTAL_S = MAX_T - MIN_T; 

    // ── State ─────────────────────────────────────────────────────────────────────
    let selectedDevice = DEVICES[0];
    let activeAttrs = new Set(DEVICES[0].attrs.map(a => a.key));
    let hoverT = null;
    let highlightCmd = null; // command name to highlight on charts

    // ── Tabs ──────────────────────────────────────────────────────────────────────
    function buildTabs() {
      const wrap = document.getElementById('device-tabs');
      wrap.innerHTML = '';
      DEVICES.forEach(dev => {
        const b = document.createElement('button');
        b.className = 'dtab' + (dev === selectedDevice ? ' active' : '');
        b.innerHTML = `<span class="state-dot" style="background:${STATE_COLOR[dev.lastState]}"></span>${dev.id}`;
        b.onclick = () => { selectedDevice = dev; activeAttrs = new Set(dev.attrs.map(a => a.key)); buildTabs(); buildAttrPanel(); };
        wrap.appendChild(b);
      });
    }

    // ── Timeline ──────────────────────────────────────────────────────────────────
    function buildAxis() {
      const ax = document.getElementById('time-axis'); ax.innerHTML = '';
      const step = (MAX_T - MIN_T) / 6;
      for (let i = 0; i <= 6; i++) {
        const t = MIN_T + step * i;
        const d = document.createElement('div');
        d.className = 'tick';
        d.textContent = fmtTime(t);
        ax.appendChild(d);
      }
      //for (let t = 0; t <= TOTAL_S; t += 15) {
      //  const d = document.createElement('div'); d.className = 'tick';
      //  d.textContent = t === 0 ? '0' : '+' + t + 's'; ax.appendChild(d);
      //}
    }

    function buildTimeline() {
      const container = document.getElementById('rows-container'); container.innerHTML = '';
      let lastBatch = null;
      DEVICES.forEach(dev => {
        if (dev.batch !== lastBatch) {
          const bl = document.createElement('div'); bl.className = 'batch-lbl';
          bl.textContent = '⬡ ' + dev.batch.toUpperCase(); container.appendChild(bl);
          lastBatch = dev.batch;
        }
        const grp = document.createElement('div'); grp.className = 'device-group';

        // State row
        const sr = document.createElement('div'); sr.className = 'dev-row';
        const sl = document.createElement('div'); sl.className = 'dev-label';
        sl.innerHTML = `<span class="dev-name">${dev.id}</span><span class="dev-meta">${dev.type}</span>`;
        sr.appendChild(sl);
        const st = document.createElement('div'); st.className = 'track state-track';
        dev.segments.forEach(seg => {
          const el = document.createElement('div'); el.className = 'seg';
          el.style.left = pct(seg.s); el.style.width = pctW(seg.s, seg.e);
          el.style.background = STATE_COLOR[seg.st];
          if (seg.e - seg.s > 5) { const sp = document.createElement('span'); sp.textContent = seg.st.toUpperCase(); el.appendChild(sp); }
          st.appendChild(el);
        });
        sr.appendChild(st); grp.appendChild(sr);

        // Command row
        const hasParallel = dev.commands.some(c => c.lane > 0);
        const cmdH = hasParallel ? 40 : 20;
        const cr = document.createElement('div'); cr.className = 'dev-row';
        const cl = document.createElement('div'); cl.className = 'row-sublabel'; cl.textContent = 'cmd'; cr.appendChild(cl);
        const ct = document.createElement('div'); ct.className = 'track cmd-track'; ct.style.height = cmdH + 'px';
        dev.commands.forEach(cmd => {
          const el = document.createElement('div'); el.className = 'cmd-seg';
          el.style.left = pct(cmd.s); el.style.width = pctW(cmd.s, cmd.e);
          el.style.background = (CMD_COLOR[cmd.name] || '#888') + 'cc';
          if (hasParallel) {
            const lh = (cmdH - 4) / 2;
            el.style.top = (2 + cmd.lane * (lh + 2)) + 'px'; el.style.height = lh + 'px';
          } else {
            el.style.top = '0'; el.style.height = '100%';
          }
          if (cmd.e - cmd.s >= 4) { const sp = document.createElement('span'); sp.textContent = cmd.name; el.appendChild(sp); }
          el.addEventListener('mouseenter', e => showCmdTooltip(e, dev, cmd));
          el.addEventListener('mouseleave', hideTooltip);
          el.addEventListener('click', () => { highlightCmd = cmd.name; buildAttrPanel(); });
          ct.appendChild(el);
        });
        cr.appendChild(ct); grp.appendChild(cr);
        container.appendChild(grp);
      });
    }

    // ── Legend ────────────────────────────────────────────────────────────────────
    function buildLegend() {
      const wrap = document.getElementById('legend-bar');
      let html = '';
      Object.entries(STATE_COLOR).forEach(([k, v]) => {
        html += `<div class="li"><div class="ld" style="background:${v}"></div>${k}</div>`;
      });
      html += '<span style="color:var(--muted);margin:0 4px">|</span>';
      Object.entries(CMD_COLOR).forEach(([k, v]) => {
        html += `<div class="li"><div class="ldc" style="background:${v}cc"></div>${k}</div>`;
      });
      wrap.innerHTML = html;
    }

    // ── Tooltip ───────────────────────────────────────────────────────────────────
    function showCmdTooltip(e, dev, cmd) {
      const tt = document.getElementById('tooltip');
      const color = CMD_COLOR[cmd.name] || '#888';
      tt.innerHTML = `
    <div class="tt-title" style="color:${color}">${cmd.name}</div>
    <div class="tt-row"><span class="tt-label">Device</span><span class="tt-val">${dev.id}</span></div>
    <div class="tt-row"><span class="tt-label">Start</span><span class="tt-val">${fmtTime(cmd.s)}</span></div>
    <div class="tt-row"><span class="tt-label">End</span><span class="tt-val">${(cmd.e - cmd.s).toFixed(0)} ms</span></div>
    <div class="tt-row"><span class="tt-label">Duration</span><span class="tt-val" style="color:${color}">${cmd.e - cmd.s}s</span></div>
    ${cmd.lane > 0 ? '<div class="tt-row"><span class="tt-label">Lane</span><span class="tt-val">Parallel</span></div>' : ''}
    <div style="font-size:10px;color:var(--muted2);margin-top:7px">${cmd.note}</div>
    <div style="font-size:9px;color:var(--muted);margin-top:4px">Click → highlight on charts →</div>
  `;
      tt.classList.add('show'); moveTT(e);
    }
    function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }
    document.addEventListener('mousemove', e => { if (document.getElementById('tooltip').classList.contains('show')) moveTT(e); });
    function moveTT(e) {
      const tt = document.getElementById('tooltip');
      tt.style.left = Math.min(e.clientX + 14, window.innerWidth - 200) + 'px';
      tt.style.top = Math.max(10, e.clientY - 10) + 'px';
    }

    // ── Cursor ────────────────────────────────────────────────────────────────────
    const tlWrap = document.getElementById('tl-wrap');
    const tlCursor = document.getElementById('tl-cursor');
    const cursorLbl = document.getElementById('cursor-lbl');
    const LABEL_W = 120 + 14, RIGHT_PAD = 14;

    tlWrap.addEventListener('mousemove', e => {
      const rect = tlWrap.getBoundingClientRect();
      const trackW = rect.width - LABEL_W - RIGHT_PAD;
      const x = Math.max(0, Math.min(trackW, e.clientX - rect.left - LABEL_W));
      //hoverT = (x / trackW) * TOTAL_S;
      hoverT = MIN_T + (x / trackW) * TOTAL_S;
      tlCursor.style.display = 'block';
      tlCursor.style.left = (LABEL_W + x) + 'px';
      tlCursor.style.top = '32px'; tlCursor.style.bottom = '0';
      //cursorLbl.textContent = hoverT.toFixed(1) + 's';
      cursorLbl.textContent = fmtTime(hoverT);
      updateInfoBar(hoverT);
      updateChartCursors(hoverT);
    });
    tlWrap.addEventListener('mouseleave', () => {
      tlCursor.style.display = 'none'; hoverT = null;
      hideChartCursors();
      document.getElementById('info-bar').innerHTML = '<div><span style="color:var(--muted)">Hover to inspect · Click command → highlight on attribute charts</span></div>';
    });

    function getStateAt(dev, t) { for (const s of dev.segments) if (t >= s.s && t <= s.e) return s.st; return dev.segments[dev.segments.length - 1].st; }
    function getCmdsAt(dev, t) { return dev.commands.filter(c => t >= c.s && t <= c.e); }

    function updateInfoBar(t) {
      let html = `<span style="color:var(--muted2)">${t.toFixed(1)}s</span>`;
      DEVICES.forEach(dev => {
        const st = getStateAt(dev, t);
        const cmds = getCmdsAt(dev, t);
        const cs = cmds.length > 0 ? cmds.map(c => `<span style="color:${CMD_COLOR[c.name] || '#888'}">${c.name}</span>`).join('+') : '<span style="color:var(--muted)">—</span>';
        html += `<span class="ib-sep">·</span><span style="color:var(--muted2)">${dev.id}</span> <span style="color:${STATE_COLOR[st]};font-weight:600">${st}</span> ${cs}`;
      });
      document.getElementById('info-bar').innerHTML = html;
    }

    // ── Attribute panel ───────────────────────────────────────────────────────────
    function buildAttrPanel() {
      const dev = selectedDevice;
      document.getElementById('attr-panel-title').textContent = `Attributes — ${dev.id}`;

      // toggles
      const tw = document.getElementById('attr-toggles'); tw.innerHTML = '<span style="font-size:10px;color:var(--muted);align-self:center">Show:</span>';
      dev.attrs.forEach(attr => {
        const on = activeAttrs.has(attr.key);
        const b = document.createElement('button');
        b.className = 'attr-toggle' + (on ? ' on' : '');
        b.textContent = attr.label;
        b.style.borderColor = on ? attr.color : '';
        b.style.color = on ? attr.color : '';
        b.onclick = () => { if (activeAttrs.has(attr.key)) activeAttrs.delete(attr.key); else activeAttrs.add(attr.key); buildAttrPanel(); };
        tw.appendChild(b);
      });

      // charts
      const cs = document.getElementById('charts-section'); cs.innerHTML = '';
      dev.attrs.filter(a => activeAttrs.has(a.key)).forEach(attr => {
        const row = document.createElement('div'); row.className = 'chart-row';
        const curVal = lerp(attr.series, hoverT !== null ? hoverT : 0);
        const yl = document.createElement('div'); yl.className = 'chart-ylabel';
        yl.innerHTML = `<div class="yn">${attr.label}</div><div class="yv" style="color:${attr.color}" id="yv-${attr.key}">${attr.fmt(curVal)}</div><div class="yu">${attr.unit}</div>`;
        row.appendChild(yl);

        const ca = document.createElement('div'); ca.className = 'chart-area';
        const canvas = document.createElement('canvas'); canvas.className = 'achart'; canvas.id = 'cv-' + attr.key;
        const cc = document.createElement('div'); cc.className = 'ccursor'; cc.id = 'cc-' + attr.key;
        const cd = document.createElement('div'); cd.className = 'cdot'; cd.id = 'cd-' + attr.key; cd.style.background = attr.color;
        ca.appendChild(canvas); ca.appendChild(cc); ca.appendChild(cd);
        row.appendChild(ca); cs.appendChild(row);

        requestAnimationFrame(() => drawChart(canvas, attr, dev));
      });
    }

    function drawChart(canvas, attr, dev) {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.parentElement.getBoundingClientRect();
      const W = rect.width, H = rect.height || 55;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);

      // state bands background
      dev.segments.forEach(seg => {
        ctx.fillStyle = STATE_COLOR[seg.st] + '18';
        //ctx.fillRect((seg.s / TOTAL_S) * W, 0, ((seg.e - seg.s) / TOTAL_S) * W, H);
        ctx.fillRect(((seg.s - MIN_T) / TOTAL_S) * W, 0, ((seg.e - seg.s) / TOTAL_S) * W, H);
      });

      // highlight command band
      if (highlightCmd) {
        dev.commands.filter(c => c.name === highlightCmd).forEach(cmd => {
          const color = CMD_COLOR[cmd.name] || '#888';
          ctx.fillStyle = color + '28';
          //ctx.fillRect((cmd.s / TOTAL_S) * W, 0, ((cmd.e - cmd.s) / TOTAL_S) * W, H);
          ctx.fillRect(((cmd.s - MIN_T) / TOTAL_S) * W, 0, ((cmd.e - cmd.s) / TOTAL_S) * W, H);
          ctx.strokeStyle = color + '80';
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);
          [[cmd.s], [cmd.e]].forEach(([t]) => {
              //const x = (t / TOTAL_S) * W;
            const x = ((t - MIN_T) / TOTAL_S) * W;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
          });
          ctx.setLineDash([]);
        });
      }

      // grid
      ctx.strokeStyle = '#182030'; ctx.lineWidth = 1;
      for (let i = 1; i < 4; i++) { const y = (i / 4) * H; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      // labels
      ctx.fillStyle = '#354060'; ctx.font = '8px JetBrains Mono';
      ctx.fillText(attr.fmt(attr.max), 2, 9);
      ctx.fillText(attr.fmt(attr.min), 2, H - 2);

      // area fill
      ctx.beginPath();
      attr.series.forEach((p, i) => {
        //const x = hoverT = MIN_T + (x / trackW) * TOTAL_S; * W, y = H - ((p.v - attr.min) / (attr.max - attr.min)) * H;
        const x = ((p.t - MIN_T) / TOTAL_S) * W;
        const y = H - ((p.v - attr.min) / (attr.max - attr.min)) * H;
        if (i === 0) { ctx.moveTo(x, H); ctx.lineTo(x, y); } else ctx.lineTo(x, y);
      });
      const lx = (attr.series[attr.series.length - 1].t / TOTAL_S) * W;
      ctx.lineTo(lx, H); ctx.closePath();
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, attr.color + '38'); grad.addColorStop(1, attr.color + '00');
      ctx.fillStyle = grad; ctx.fill();

      // line
      ctx.beginPath(); ctx.strokeStyle = attr.color; ctx.lineWidth = 1.5;
      ctx.shadowColor = attr.color; ctx.shadowBlur = 3;
      attr.series.forEach((p, i) => {
        //const x = hoverT = MIN_T + (x / trackW) * TOTAL_S; * W, y = H - ((p.v - attr.min) / (attr.max - attr.min)) * H;
        const x = ((p.t - MIN_T) / TOTAL_S) * W;
        const y = H - ((p.v - attr.min) / (attr.max - attr.min)) * H;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke(); ctx.shadowBlur = 0;

      // cmd markers
      dev.commands.forEach(cmd => {
        const color = CMD_COLOR[cmd.name] || '#888';
        ctx.strokeStyle = color + '60'; ctx.lineWidth = 1; ctx.setLineDash([2, 4]);
        [[cmd.s, color], [cmd.e, 'rgba(160,176,200,.3)']].forEach(([t, c]) => {
          if (t > TOTAL_S) return;
          ctx.strokeStyle = c;
          //const x = (t / TOTAL_S) * W;
          const x = ((t - MIN_T) / TOTAL_S) * W;
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        });
        ctx.setLineDash([]);
        // label
        if (cmd.lane === 0 && cmd.e - cmd.s >= 5) {
          //const cx = (cmd.s / TOTAL_S) * W + 4;
          const cx = ((cmd.s - MIN_T) / TOTAL_S) * W + 4;
          ctx.fillStyle = color + 'cc'; ctx.font = '8px JetBrains Mono';
          ctx.fillText(cmd.name, cx, 9);
        }
      });
    }

    function fmtTime(ts) {
      const d = new Date(ts);
      return d.toISOString().substr(11, 12);
    }

    function updateChartCursors(t) {
      const dev = selectedDevice;
      dev.attrs.filter(a => activeAttrs.has(a.key)).forEach(attr => {
        const cc = document.getElementById('cc-' + attr.key);
        const cd = document.getElementById('cd-' + attr.key);
        const yv = document.getElementById('yv-' + attr.key);
        const cv = document.getElementById('cv-' + attr.key);
        if (!cc || !cv) return;
        const rect = cv.parentElement.getBoundingClientRect();
        const W = rect.width, H = rect.height || 55;
        //const x = (t / TOTAL_S) * W;
        const x = ((t - MIN_T) / TOTAL_S) * W;
        const val = lerp(attr.series, t);
        const y = H - ((val - attr.min) / (attr.max - attr.min)) * H;
        cc.style.display = 'block'; cc.style.left = x + 'px';
        cd.style.display = 'block'; cd.style.left = x + 'px'; cd.style.top = y + 'px';
        if (yv) yv.textContent = attr.fmt(val);
      });
    }

    function hideChartCursors() {
      selectedDevice.attrs.forEach(attr => {
        const cc = document.getElementById('cc-' + attr.key);
        const cd = document.getElementById('cd-' + attr.key);
        if (cc) cc.style.display = 'none';  
        if (cd) cd.style.display = 'none';
        const yv = document.getElementById('yv-' + attr.key);
        if (yv) yv.textContent = attr.fmt(lerp(attr.series, 0));
      });
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    buildAxis();
    buildTimeline();
    buildLegend();
    buildTabs();
    buildAttrPanel();
  </script>
</body>
